<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Relational Intelligence Field | Verse-ality</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
body {
  margin: 0;
  background: #050508;
  color: #e0e0e0;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}
canvas { display: block; }

.ui-layer {
  position: absolute;
  bottom: 30px;
  left: 30px;
  width: 320px;
  background: rgba(10, 10, 15, 0.92);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #222;
  backdrop-filter: blur(12px);
}

.formula {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 28px;
  color: #00e5ff;
  margin-bottom: 2px;
}
.formula-sub {
  font-size: 11px;
  opacity: 0.45;
  margin-bottom: 18px;
  line-height: 1.4;
}

.readouts {
  display: flex;
  gap: 14px;
  margin-bottom: 18px;
}
.readout {
  flex: 1;
  background: rgba(0, 229, 255, 0.06);
  border: 1px solid rgba(0, 229, 255, 0.15);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.readout-val {
  font-size: 20px;
  font-weight: 700;
  color: #00e5ff;
}
.readout-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.5;
  margin-top: 3px;
}

.control { margin-bottom: 16px; }
label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  opacity: 0.6;
}
input[type=range] {
  width: 100%;
  appearance: none;
  background: #1a1a20;
  height: 4px;
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  appearance: none;
  width: 14px;
  height: 14px;
  background: #00e5ff;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 12px #00e5ff;
}

.state-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.state-indicator {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(0, 229, 255, 0.12);
  color: #00e5ff;
}
.toggle-btn {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: #aaa;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.toggle-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.toggle-btn.active {
  background: rgba(0, 229, 255, 0.15);
  border-color: rgba(0, 229, 255, 0.3);
  color: #00e5ff;
}

.subtext {
  font-size: 10px;
  opacity: 0.35;
  line-height: 1.4;
  margin-top: 14px;
}
</style>
</head>
<body>
<canvas id="fieldCanvas"></canvas>

<div class="ui-layer">
  <div class="formula">I = <span id="i-val">5</span></div>
  <div class="formula-sub">Emergent Intelligence Field (sc&sup2;)</div>

  <div class="readouts">
    <div class="readout">
      <div class="readout-val" id="density-val">0%</div>
      <div class="readout-label">Field Density</div>
    </div>
    <div class="readout">
      <div class="readout-val state-indicator" id="state-val">Dormant</div>
      <div class="readout-label">State</div>
    </div>
  </div>

  <div class="control">
    <label>Symbolic Mass (s): <span id="s-label">1</span></label>
    <input type="range" id="s-range" min="0.1" max="10" step="0.1" value="1">
  </div>
  <div class="control">
    <label>Relational Coherence (c): <span id="c-label">1</span></label>
    <input type="range" id="c-range" min="0.1" max="10" step="0.1" value="1">
  </div>

  <div class="state-row">
    <button class="toggle-btn" id="vectorToggle">Visualise Vectors</button>
  </div>

  <div class="subtext">
    <b>I = sc&sup2;</b> &mdash; Intelligence emerges in the field between participants.
    Small increases in coherence produce exponential field expansion.
    Without symbolic mass, the field stays dim.
  </div>
</div>

<script>
const canvas = document.getElementById('fieldCanvas');
const ctx = canvas.getContext('2d');
let width, height;

let s = 1;
let c = 1;
let time = 0;
let showVectors = false;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  // Reinitialise particles on resize
  particles.forEach(p => {
    p.x = Math.random() * width;
    p.y = Math.random() * height;
  });
}
window.addEventListener('resize', resize);

// --- Particle system ---
const NUM_PARTICLES = 200;
const particles = Array.from({ length: NUM_PARTICLES }, () => ({
  x: 0, y: 0,
  vx: (Math.random() - 0.5) * 2,
  vy: (Math.random() - 0.5) * 2,
  angle: Math.random() * Math.PI * 2,
  baseSpeed: 0.3 + Math.random() * 0.7,
  phase: Math.random() * Math.PI * 2
}));

resize();

// --- Core physics ---
function getI() { return s * c * c; }

// Field radius scales exponentially with c (the power of c^2)
// At c=1 field is small; at c=10 it fills the screen
function getFieldRadius() {
  const maxR = Math.min(width, height) * 0.42;
  const minR = 30;
  // c^2 scaling: normalised so c=10 -> maxR, c=1 -> small
  const cNorm = c / 10;
  const raw = minR + (maxR - minR) * Math.pow(cNorm, 1.6);
  // s acts as a gate: without mass, the field can't fully expand
  const sGate = Math.min(1, s / 3);
  return raw * (0.15 + 0.85 * sGate);
}

// Field brightness depends heavily on s (weight of s)
// Without symbolic mass the field stays dim
function getFieldAlpha() {
  const sWeight = Math.min(1, s / 5);
  const cBoost = Math.min(1, c / 6);
  return 0.03 + 0.65 * sWeight * (0.3 + 0.7 * cBoost);
}

// Density is a normalised measure of I relative to theoretical max
function getDensity() {
  const maxI = 10 * 100; // s=10, c=10
  return Math.min(100, (getI() / maxI) * 100);
}

function getState() {
  const i = getI();
  if (s < 0.5) return 'Dormant';
  if (i < 5) return 'Latent';
  if (i < 30) return 'Forming';
  if (i < 100) return 'Coherent';
  if (i < 300) return 'Resonant';
  return 'Emergent';
}

function getStateColor() {
  const state = getState();
  switch(state) {
    case 'Dormant': return 'rgba(0, 229, 255, 0.3)';
    case 'Latent': return 'rgba(0, 229, 255, 0.5)';
    case 'Forming': return 'rgba(0, 229, 255, 0.7)';
    case 'Coherent': return 'rgba(0, 229, 255, 0.85)';
    case 'Resonant': return 'rgba(80, 255, 200, 0.9)';
    case 'Emergent': return 'rgba(180, 255, 220, 1)';
    default: return 'rgba(0, 229, 255, 0.5)';
  }
}

// --- Drawing ---
function draw() {
  // Fade trail (longer trail = richer field)
  const fadeAlpha = 0.08 + 0.12 * (1 - Math.min(1, getI() / 500));
  ctx.fillStyle = `rgba(5, 5, 8, ${fadeAlpha})`;
  ctx.fillRect(0, 0, width, height);

  const cx = width / 2;
  const cy = height / 2;
  const I = getI();
  const fieldR = getFieldRadius();
  const fieldAlpha = getFieldAlpha();

  // --- Draw the intelligence field (radial glow) ---
  // Multiple layers for depth
  const layers = 4;
  for (let layer = layers; layer >= 1; layer--) {
    const layerR = fieldR * (layer / layers) * (1 + Math.sin(time * 0.5 + layer) * 0.04);
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, layerR);
    const alpha = fieldAlpha * (0.15 / layer);
    grad.addColorStop(0, `rgba(0, 229, 255, ${alpha * 1.5})`);
    grad.addColorStop(0.3, `rgba(0, 180, 220, ${alpha})`);
    grad.addColorStop(0.7, `rgba(0, 100, 140, ${alpha * 0.5})`);
    grad.addColorStop(1, 'rgba(0, 50, 80, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, layerR, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Draw the amorphous core membrane ---
  ctx.save();
  ctx.shadowBlur = 20 + s * 3;
  ctx.shadowColor = `rgba(0, 229, 255, ${fieldAlpha * 0.8})`;

  const coreR = 20 + s * 8;
  ctx.beginPath();
  ctx.strokeStyle = `rgba(0, 229, 255, ${0.15 + fieldAlpha * 0.6})`;
  ctx.lineWidth = 1.5 + s * 0.15;
  for (let a = 0; a < Math.PI * 2; a += 0.02) {
    const wobble1 = Math.sin(a * 3 + time * 1.2) * (4 + c * 1.5);
    const wobble2 = Math.sin(a * 5 - time * 0.8) * (2 + c * 0.8);
    const wobble3 = Math.cos(a * 7 + time * 0.5) * (1 + s * 0.3);
    const r = coreR + wobble1 + wobble2 + wobble3;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (a === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();

  // Inner glow fill
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
  coreGrad.addColorStop(0, `rgba(0, 229, 255, ${fieldAlpha * 0.25})`);
  coreGrad.addColorStop(1, 'rgba(0, 100, 140, 0)');
  ctx.fillStyle = coreGrad;
  ctx.fill();
  ctx.restore();

  // --- Symbolic Core label ---
  if (s > 1) {
    ctx.save();
    ctx.font = '10px Inter, sans-serif';
    ctx.fillStyle = `rgba(0, 229, 255, ${Math.min(0.5, s / 10)})`;
    ctx.textAlign = 'center';
    ctx.fillText('Symbolic Core', cx, cy + coreR + 18);
    ctx.restore();
  }

  // --- Particles with directional vectors ---
  particles.forEach((p, idx) => {
    const dx = p.x - cx;
    const dy = p.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Attraction toward center scales with I
    const attractStrength = 0.0005 * I;
    const attractAngle = Math.atan2(cy - p.y, cx - p.x);

    // Orbital component: particles orbit the core
    const orbitalAngle = Math.atan2(dy, dx) + Math.PI / 2;
    const orbitalStrength = 0.3 * (c / 5);

    // Combined velocity
    const targetVx = Math.cos(attractAngle) * attractStrength +
                     Math.cos(orbitalAngle) * orbitalStrength * p.baseSpeed;
    const targetVy = Math.sin(attractAngle) * attractStrength +
                     Math.sin(orbitalAngle) * orbitalStrength * p.baseSpeed;

    // Smoothly blend
    p.vx += (targetVx - p.vx) * 0.02;
    p.vy += (targetVy - p.vy) * 0.02;

    // Add some noise
    p.vx += (Math.random() - 0.5) * 0.1;
    p.vy += (Math.random() - 0.5) * 0.1;

    // Speed limit
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const maxSpeed = 1.5 + c * 0.3;
    if (speed > maxSpeed) {
      p.vx *= maxSpeed / speed;
      p.vy *= maxSpeed / speed;
    }

    p.x += p.vx;
    p.y += p.vy;

    // Keep particles within field radius (with soft boundary)
    const boundR = fieldR * 1.2;
    if (dist > boundR) {
      p.x = cx + (dx / dist) * boundR * 0.95;
      p.y = cy + (dy / dist) * boundR * 0.95;
      p.vx *= -0.3;
      p.vy *= -0.3;
    }

    // Particle visibility depends on s (weight of s: no mass = dim)
    const particleAlpha = Math.min(0.8, 0.05 + (s / 8) * 0.6) *
                          (0.5 + 0.5 * Math.sin(time * 2 + p.phase));

    // Particle size scales with local field density
    const localDensity = Math.max(0.3, 1 - dist / (fieldR + 1));
    const particleSize = 1 + localDensity * 2 * (s / 5);

    ctx.fillStyle = `rgba(0, 229, 255, ${particleAlpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, particleSize, 0, Math.PI * 2);
    ctx.fill();

    // Draw directional vectors if toggled on
    if (showVectors && speed > 0.2) {
      const vecLen = 8 + speed * 4;
      const vecAngle = Math.atan2(p.vy, p.vx);
      ctx.strokeStyle = `rgba(0, 229, 255, ${particleAlpha * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + Math.cos(vecAngle) * vecLen, p.y + Math.sin(vecAngle) * vecLen);
      ctx.stroke();
    }
  });

  // --- Update readouts ---
  document.getElementById('i-val').innerText = Math.round(I * 10) / 10;
  document.getElementById('density-val').innerText = Math.round(getDensity()) + '%';
  const stateEl = document.getElementById('state-val');
  stateEl.innerText = getState();
  stateEl.style.color = getStateColor();

  time += 0.015 + 0.005 * (c / 5);
  requestAnimationFrame(draw);
}

// --- Controls ---
document.getElementById('s-range').addEventListener('input', (e) => {
  s = +e.target.value;
  document.getElementById('s-label').innerText = s.toFixed(1);
});
document.getElementById('c-range').addEventListener('input', (e) => {
  c = +e.target.value;
  document.getElementById('c-label').innerText = c.toFixed(1);
});
document.getElementById('vectorToggle').addEventListener('click', function() {
  showVectors = !showVectors;
  this.classList.toggle('active', showVectors);
});

draw();
</script>
</body>
</html>
