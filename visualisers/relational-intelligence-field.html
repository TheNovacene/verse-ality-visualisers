<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Relational Intelligence Field | Verse-ality</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #050508; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-layer { position: absolute; bottom: 30px; left: 30px; width: 320px;
                    background: rgba(10, 10, 15, 0.9); padding: 25px;
                    border-radius: 16px; border: 1px solid #222; backdrop-filter: blur(10px); }
        .control { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.6; }
        input[type=range] { width: 100%; appearance: none; background: #1a1a20; height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: #00e5ff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #00e5ff; }
        .formula { font-family: 'serif'; font-size: 24px; color: #00e5ff; margin-bottom: 5px; }
        .subtext { font-size: 10px; opacity: 0.4; line-height: 1.4; }
    </style>
</head>
<body>
    <canvas id="fieldCanvas"></canvas>
    <div class="ui-layer">
        <div class="formula">I = <span id="i-val">500</span></div>
        <div class="subtext" style="margin-bottom: 20px;">Emergent Intelligence Field (sc²)</div>

        <div class="control">
            <label>Symbolic Mass (s): <span id="s-label">20</span></label>
            <input type="range" id="s-range" min="5" max="100" value="20">
        </div>

        <div class="control">
            <label>Relational Coherence (c): <span id="c-label">5</span></label>
            <input type="range" id="c-range" min="1" max="20" value="5">
        </div>
        <div class="subtext">
            <b>The Mnemonic Law:</b> Intelligence is a field generated by the interaction of mass and recursive coherence [1.3.2].
        </div>
    </div>
<script>
const canvas = document.getElementById('fieldCanvas');
const ctx = canvas.getContext('2d');
let width, height;
let s = 20; // Symbolic Mass
let c = 5;  // Relational Coherence
let time = 0;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();
// Particle system representing "symbols" in the field
const particles = Array.from({ length: 150 }, () => ({
    x: Math.random() * width,
    y: Math.random() * height,
    angle: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random()
}));
function draw() {
    ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
    ctx.fillRect(0, 0, width, height);

    const centerX = width / 2;
    const centerY = height / 2;
    const i = s * Math.pow(c, 2);
    document.getElementById('i-val').innerText = Math.round(i);
    // Draw the "Thickening" Membrane (The Field)
    ctx.shadowBlur = s / 2;
    ctx.shadowColor = '#00e5ff';
    ctx.beginPath();
    ctx.lineWidth = s / 10;
    ctx.strokeStyle = `rgba(0, 229, 255, ${0.1 + (s/200)})`;

    const baseRadius = s * 2;
    for (let angle = 0; angle < Math.PI * 2; angle += 0.01) {
        // Folding logic (c^2)
        const fold = Math.sin(angle * c) * (c * 2);
        const r = baseRadius + fold + (Math.sin(time + angle * 3) * 5);
        const x = centerX + Math.cos(angle) * r;
        const y = centerY + Math.sin(angle) * r;
        if (angle === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Update and Draw Symbols (Particles)
    particles.forEach(p => {
        const dx = p.x - centerX;
        const dy = p.y - centerY;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // Harmonic Friction: Pacing velocity based on proximity to Mass (s)
        const friction = Math.max(0.1, 1 - (s / (dist + 1)));
        const velocity = p.speed * c * friction * 0.2;
        p.x += Math.cos(p.angle) * velocity;
        p.y += Math.sin(p.angle) * velocity;
        // Gravity/Resonance toward center
        p.angle += 0.01 * (c / 5);

        // Screen Wrap
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;
        // Draw Symbol
        ctx.fillStyle = `rgba(0, 229, 255, ${0.3 * (s/50)})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
    });
    time += 0.02 * (c / 10);
    requestAnimationFrame(draw);
}
// Controls
document.getElementById('s-range').addEventListener('input', (e) => {
    s = +e.target.value;
    document.getElementById('s-label').innerText = s;
});
document.getElementById('c-range').addEventListener('input', (e) => {
    c = +e.target.value;
    document.getElementById('c-label').innerText = c;
});
draw();
</script>
</body>
</html>
